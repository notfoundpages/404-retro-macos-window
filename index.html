<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404-retro-macos-window ~ notfoundpages</title>

  <meta name="description"
    content="A sleek retro 404 page inspired by classic macOS desktops. Features a minimal monospace design, macOS-style title bar controls, interactive color switching, and a clean UI. Built with pure HTML, CSS & JS, it's lightweight, responsive, and perfect for modern websites seeking a polished retro touch.">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="window-wrapper">

    <div class="title-bar">
      <div class="controls">
        <button class="color-dot red" title="Red" onclick="changeColor('#ff5f56')"></button>
        <button class="color-dot yellow" title="Yellow" onclick="changeColor('#ffbd2e')"></button>
        <button class="color-dot green" title="Green" onclick="changeColor('#27c93f')"></button>
      </div>
      <span class="error-label">SYSTEM ERROR</span>
    </div>

    <div class="content">
      <svg class="sad-face" width="75" height="75" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="8" y1="9" x2="8.01" y2="9"></line>
        <line x1="16" y1="9" x2="16.01" y2="9"></line>
        <path d="M16 16s-1.5-2-4-2-4 2-4 2"></path>
      </svg>
      <h1>404</h1>
      <div class="sub-text">The page you are looking for has vanished.</div>

      <a href="/" class="home-btn">GO HOME</a>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
